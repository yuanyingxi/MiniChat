server:
  port: 8081
spring:
  application:
    name: minichat-user
  config:
    import:
      - optional:application-secret.yml
      - optional:application-${spring.profiles.active:dev}.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost}:8848
      config:
        server-addr: ${NACOS_SERVER:localhost}:8848
        import-check:
          enabled: false
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:minichat_user_db}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  elasticsearch:
    uris: http://${ES_HOST:localhost}:${ES_PORT:9200}

jwt:
  secret: ${JWT_SECRET}
  expire-hours: ${JWT_EXPIRE_HOURS:24}

aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
    sign-name: 速通互联验证码
    template-code: 100001
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:minichat-avatars}

logging:
  level:
    com.minichat: debug
    com.baomidou.mybatisplus: debug