server:
  port: 8081
spring:
  application:
    name: minichat-user
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: 127.0.0.1
      config:
        server-addr: localhost:8848
        import-check:
          enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/minichat_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: your_secure_password
  data:
    redis:
      host: localhost
      port: 6379
      password: your_secure_password
  elasticsearch:
    uris: http://localhost:9200

jwt:
  secret: MiniChatSecretKey2026MustBeAtLeast256BitsLongForHMACSHA256!
  expire-hours: 24

aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    sign-name: 速通互联验证码
    template-code: 100001
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-guangzhou.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:minichat-guangzhou-123}

logging:
  level:
    com.minichat: debug
    com.baomidou.mybatisplus: debug