server:
  port: 8082

spring:
  application:
    name: minichat-message

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

  datasource:
    url: jdbc:mysql://localhost:3307/minichat_db
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
          host: localhost
          port: 6379
          password: 123456

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

aliyun:
  oss:
    region: cn-guangzhou
    bucketName: minichat-guangzhou-123
    access-key-id: key-id
    access-key-secret: key-secret
    endpoint: https://oss-cn-guangzhou.aliyuncs.com

rocketmq:
  name-server: localhost:9876
  producer:
    group: message-producer-group