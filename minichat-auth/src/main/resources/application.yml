server:
  port: 8081
spring:
  application:
    name: minichat-auth
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
  datasource:
    url: jdbc:mysql://localhost:3306/minichat_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456

jwt:
  secret: MiniChatSecretKey2026MustBeAtLeast256BitsLongForHMACSHA256!
  expire-hours: 24

aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
    sign-name: MiniChat
    template-code: SMS_XXXXXXX

logging:
  level:
    com.minichat: debug
    com.baomidou.mybatisplus: debug