version: '3.8'                    # docker 版本

services:
  # 1. Nacos: 微服务注册中心与配置中心
  minichat-nacos:
    image: nacos/nacos-server:${NACOS_VERSION}
    container_name: minichat-nacos
    restart: always
    environment:
      - MODE=standalone
      - TZ=Asia/Shanghai
    ports:
      - "${NACOS_PORT}:8848"      # HTTP 端口
      - "${NACOS_GRPC_PORT}:9848" # gRPC 客户端请求端口 (微服务长连接)
      - "9849:9849"               # gRPC 服务端内用端口 (防止心跳同步警告)
    networks:
      - minichat-network

  # 2. MySQL 数据库
  minichat-mysql:
    image: mysql:${MYSQL_VERSION}
    container_name: minichat-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}  # root 用户密码
      - MYSQL_DATABASE=${MYSQL_DATABASE}            # 数据库的名称
      - TZ=Asia/Shanghai
    ports:
      - "${MYSQL_PORT}:3306"      # MySQL 端口
    volumes:
      - ${DATA_VOLUME_BASE}/mysql:/var/lib/mysql    # 数据卷挂载/持久化
    networks:
      - minichat-network

  # 3. Redis
  minichat-redis:
    image: redis:${REDIS_VERSION}
    container_name: minichat-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"      # Redis 端口
    volumes:
      - ${DATA_VOLUME_BASE}/redis:/data
    networks:
      - minichat-network

  # 4. RocketMQ NameServer
  rmqnamesrv:
    image: apache/rocketmq:${ROCKETMQ_VERSION}
    container_name: rmqnamesrv
    restart: always
    command: sh mqnamesrv
    environment:
      - JAVA_OPT_EXT=-Xms256m -Xmx256m  # NameServer 内存占用小，固定即可
    ports:
      - "${ROCKETMQ_NAMESRV_PORT}:9876" # NameServer 端口
    networks:
      - minichat-network

  # 5. RocketMQ Broker
  rmqbroker:
    image: apache/rocketmq:${ROCKETMQ_VERSION}
    container_name: rmqbroker
    restart: always
    depends_on:
      - rmqnamesrv
    command: sh mqbroker -c /home/rocketmq/rocketmq-${ROCKETMQ_VERSION}/conf/broker.conf
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
      - JAVA_OPT_EXT=-Xms512m -Xmx512m
    ports:
      - "${ROCKETMQ_BROKER_PORT}:10911" # Broker 主端口
      - "10909:10909"                   # VIP 端口，供宿主机 Java 客户端发消息
    volumes:
      - ${DATA_VOLUME_BASE}/rocketmq/broker/logs:/home/rocketmq/logs
      - ${DATA_VOLUME_BASE}/rocketmq/broker/store:/home/rocketmq/store
      - ./config/rocketmq/broker.conf:/home/rocketmq/rocketmq-${ROCKETMQ_VERSION}/conf/broker.conf  # 本地的配置文件与容器内的配置文件
    networks:
      - minichat-network

  # 6. Elasticsearch
  minichat-elasticsearch:
    image: elasticsearch:${ELASTICSEARCH_VERSION}
    container_name: minichat-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms${ES_JVM_HEAP_LIMIT} -Xmx${ES_JVM_HEAP_LIMIT}
      - TZ=Asia/Shanghai
    ports:
      - "${ES_PORT}:9200"         # ES HTTP 端口
    volumes:
      - ${DATA_VOLUME_BASE}/elasticsearch/data:/usr/share/elasticsearch/data
      - ${DATA_VOLUME_BASE}/elasticsearch/logs:/usr/share/elasticsearch/logs
    networks:
      - minichat-network

  # 7. Kibana
  minichat-kibana:
    image: kibana:${KIBANA_VERSION}
    container_name: minichat-kibana
    restart: always
    depends_on:
      - minichat-elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://minichat-elasticsearch:9200
      - I18N_LOCALE=zh-CN
    ports:
      - "${KIBANA_PORT}:5601"     # Kibana 端口
    networks:
      - minichat-network

  # 8. Nginx
  minichat-nginx:
    image: nginx:${NGINX_VERSION}
    container_name: minichat-nginx
    restart: always
    ports:
      - "${NGINX_PORT}:80"        # Nginx HTTP 端口
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro       # 静态资源目录挂载
    networks:
      - minichat-network

networks:
  minichat-network:
    driver: bridge